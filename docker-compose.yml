services:
  backend:
    build: ./backend
    container_name: avbt-backend
    env_file: ./backend/.env
    environment:
      DATABASE_URL: sqlite+aiosqlite:////app/data/avbt.db
      # Frontend origins allowed by CORS. When serving through nginx or a
      # non-localhost host, set CORS_ORIGINS in .env (comma-separated).
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
    volumes:
      - ./backend/data:/app/data
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # Browser hits the host's mapped port, not the container. Override
        # via env when proxying through nginx etc.
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8000}
    container_name: avbt-frontend
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
